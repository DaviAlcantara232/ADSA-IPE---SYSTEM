<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar Senha | ADSA IPÊ</title>


<style>


*{

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;

}



body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#111827;

}





.recuperar-container{

    width:380px;

    background:white;

    padding:35px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

}





.logo{

    text-align:center;

    margin-bottom:30px;

}



.logo h1{

    color:#2563eb;

    font-size:32px;

}



.logo p{

    color:#6b7280;

}





.input-group{

    margin-bottom:20px;

}



.input-group label{

    display:block;

    margin-bottom:8px;

    color:#374151;

}



.input-group input{

    width:100%;

    padding:14px;

    border-radius:10px;

    border:1px solid #d1d5db;

}





button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:16px;

    cursor:pointer;

}



button:hover{

    background:#1d4ed8;

}





.mensagem{

    text-align:center;

    margin-top:15px;

    color:#16a34a;

}





.links{

    text-align:center;

    margin-top:20px;

}



.links a{

    color:#2563eb;

    text-decoration:none;

}


</style>


</head>


<body>



<div class="recuperar-container">



<div class="logo">

<h1>
ADSA IPÊ
</h1>

<p>
Recuperação de senha
</p>

</div>







<div class="input-group">


<label>

E-mail cadastrado

</label>


<input 
type="email"
id="email"
placeholder="Digite seu e-mail"
>


</div>







<button onclick="recuperar()">

Enviar recuperação

</button>







<p class="mensagem" id="mensagem"></p>







<div class="links">

<a href="index.html">

← Voltar para Login

</a>

</div>






</div>








<script>


function recuperar(){


let email =
document.getElementById("email").value;



if(email === ""){


document.getElementById("mensagem").style.color="red";


document.getElementById("mensagem").innerHTML =
"Digite seu e-mail";


return;

}





document.getElementById("mensagem").style.color="#16a34a";


document.getElementById("mensagem").innerHTML =
"Solicitação enviada com sucesso!";



}



</script>



</body>

</html>
