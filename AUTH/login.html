<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | ADSA IPÊ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;

}


.login-box{

    width:380px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);

}


.logo{

    text-align:center;
    margin-bottom:30px;

}


.logo h1{

    color:#2563eb;
    font-size:32px;

}


.logo p{

    color:#64748b;

}



.input{

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    outline:none;

}



.input:focus{

    border-color:#2563eb;

}



button{

    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;

}



button:hover{

    background:#1d4ed8;

}



.links{

    margin-top:20px;
    text-align:center;

}


.links a{

    display:block;
    color:#2563eb;
    text-decoration:none;
    margin-top:10px;

}


</style>

</head>


<body>


<div class="login-box">


<div class="logo">

<h1>ADSA IPÊ</h1>

<p>Acesso ao Sistema</p>

</div>



<input
class="input"
id="email"
type="email"
placeholder="E-mail"
>



<input
class="input"
id="senha"
type="password"
placeholder="Senha"
>



<button onclick="login()">

Entrar

</button>




<a href="recuperar-senha.html">
Esqueci minha senha
</a>


</div>



</div>




<script>


function login(){



let email =

document.getElementById("email").value;



let senha =

document.getElementById("senha").value;




let usuarios =

JSON.parse(

localStorage.getItem("usuarios")

) || [];





let usuario = usuarios.find(

u =>

u.email === email &&

u.senha === senha

);




if(!usuario){


alert("E-mail ou senha incorretos!");

return;


}




localStorage.setItem(

"usuarioLogado",

JSON.stringify(usuario)

);





/*
=================================
 CONTROLE DE ACESSO
=================================
*/


if(usuario.cargo === "Administrador"){


window.location.href="../ADMIN/dashboard.html";


}


else{


window.location.href="../PORTAL-MEMBRO/dashboard.html";


}




}



</script>



</body>

</html>
