<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro | ADSA IPÊ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;

}


.container{

    width:400px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);

}


.logo{

    text-align:center;
    margin-bottom:25px;

}


.logo h1{

    color:#2563eb;

}


.logo p{

    color:#64748b;

}



.input{

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #cbd5e1;
    border-radius:10px;

}



label{

    display:block;
    margin-bottom:8px;
    color:#475569;

}



button{

    width:100%;
    padding:14px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;

}


button:hover{

    background:#1d4ed8;

}


.voltar{

    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#2563eb;

}

</style>

</head>


<body>


<div class="container">


<div class="logo">

<h1>ADSA IPÊ</h1>

<p>Criar usuário</p>

</div>



<input 
class="input"
id="nome"
placeholder="Nome completo"
>



<input 
class="input"
id="email"
type="email"
placeholder="E-mail"
>



<input 
class="input"
id="senha"
type="password"
placeholder="Senha"
>



<label>Cargo</label>


<select class="input" id="cargo">


<option value="Membro">
👤 Membro
</option>


<option value="Obreiro">
🙏 Obreiro
</option>


<option value="Cooperador">
🤝 Cooperador
</option>


<option value="Midia">
📺 Mídia
</option>


<option value="Tesoureiro">
💰 Tesoureiro
</option>


<option value="Secretario">
📂 Secretário
</option>


<option value="Pastor">
⛪ Pastor
</option>


<option value="Administrador">
👑 Administrador
</option>


</select>




<button onclick="criarConta()">

Criar conta

</button>



<a class="voltar" href="login.html">

Voltar para login

</a>


</div>



<script>


function criarConta(){


let nome =
document.getElementById("nome").value;


let email =
document.getElementById("email").value;


let senha =
document.getElementById("senha").value;


let cargo =
document.getElementById("cargo").value;



if(
nome === "" ||
email === "" ||
senha === ""
){

alert("Preencha todos os campos!");

return;

}



let usuarios =

JSON.parse(

localStorage.getItem("usuarios")

) || [];



let existe = usuarios.find(

usuario => usuario.email === email

);



if(existe){

alert("Esse usuário já existe!");

return;

}



usuarios.push({

nome:nome,

email:email,

senha:senha,

cargo:cargo

});



localStorage.setItem(

"usuarios",

JSON.stringify(usuarios)

);



alert("Usuário criado com sucesso!");



window.location.href="login.html";


}



</script>


</body>

</html>
