<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste Menu ADSA IPÊ</title>


<style>


*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}



body{

    font-family:Arial, sans-serif;

}



.header{

    height:80px;

    width:100%;

    position:fixed;

    top:0;

    left:0;

    background:#0D47A1;

    z-index:9999;

}



.header-container{

    height:80px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 20px;

    position:relative;

}



.logo{

    color:white;

    font-size:22px;

    font-weight:bold;

}



.menu-toggle{

    display:none;

    width:42px;

    height:42px;

    border:none;

    background:transparent;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    gap:5px;

}



.menu-toggle span{

    width:30px;

    height:3px;

    background:white;

    border-radius:5px;

}



.navigation{

    display:flex;

    align-items:center;

    gap:25px;

}



.navigation a{

    color:white;

    text-decoration:none;

}



@media(max-width:768px){


.menu-toggle{

    display:flex;

}



.navigation{

    display:none;

    position:absolute;

    top:80px;

    right:0;

    width:280px;

    background:#0D47A1;

    padding:25px;

    flex-direction:column;

    align-items:center;

    gap:20px;

}



.navigation.active{

    display:flex;

}


}




main{

    padding-top:120px;

}



section{

    height:800px;

    padding:20px;

}



</style>


</head>


<body>



<header class="header">


<div class="header-container">


<div class="logo">

ADSA IPÊ

</div>



<button class="menu-toggle">

<span></span>

<span></span>

<span></span>

</button>




<nav class="navigation">


<a href="#">Início</a>

<a href="#">Sobre</a>

<a href="#">Eventos</a>

<a href="#">Ministérios</a>

<a href="#">Transmissão</a>

<a href="#">Contato</a>

<a href="#">Área do Membro</a>


</nav>


</div>


</header>





<main>


<section>

<h1>

Teste de menu mobile

</h1>


<p>

Clique nas três barras no celular.

</p>


</section>


</main>




<script>


const menuToggle = document.querySelector(".menu-toggle");

const navigation = document.querySelector(".navigation");



menuToggle.addEventListener("click",()=>{


navigation.classList.toggle("active");


});



</script>



</body>

</html>
